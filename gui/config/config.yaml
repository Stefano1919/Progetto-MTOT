- exercise: Analisi Spettrale IASI
  settings: spectral_analysis/tabSettings.yaml
  defaults:
    - id: ParametriTab
      values:
        CampoInizioBanda: 2150.0
        CampoFineBanda: 2250.0
        CampoRisoluzione: 0.25
        CampoComponentiPrincipali: 7
    - id: VisTab
      values:
        CampoSpettriVis: 50
        CampoIndiceSpettroTest: 100
        CampoIndiceCanaleMappa: 100
  inputs:
    - name: inizio_banda
      tab: ParametriTab
      component: CampoInizioBanda
    - name: fine_banda
      tab: ParametriTab
      component: CampoFineBanda
    - name: risoluzione_spettrale
      tab: ParametriTab
      component: CampoRisoluzione
    - name: num_componenti_principali
      tab: ParametriTab
      component: CampoComponentiPrincipali
    - name: numero_spettri_visualizzati
      tab: VisTab
      component: CampoSpettriVis
    - name: indice_spettro_test
      tab: VisTab
      component: CampoIndiceSpettroTest
    - name: indice_canale_mappa
      tab: VisTab
      component: CampoIndiceCanaleMappa
  pipeline: spectral_analysis/pipeline.yaml
  plots: spectral_analysis/plots.yaml
  resultText: "['Rapporto bonus calcolato: ', num2str(rapporto_bonus)]"
  resultTextInterpreter: 'none'