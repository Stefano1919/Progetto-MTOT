- exercise: Analisi Spettrale IASI
  settings: spectral_analysis/tabSettings.yaml
  image: IASI.jpg
  defaults:
    - id: ParametriTab
      values:
        MenuGas: N2O
        CampoFov: 1
        MenuTerreno: Terra
        CampoNubi: 10
  inputs:
    - name: gas_selezionato
      tab: ParametriTab
      component: MenuGas
    - name: fov_selezionato
      tab: ParametriTab
      component: CampoFov
    - name: terreno_selezionato
      tab: ParametriTab
      component: MenuTerreno
    - name: nubi_max
      tab: ParametriTab
      component: CampoNubi
  pipeline: spectral_analysis/pipeline.yaml
  plots: spectral_analysis/plots.yaml
  resultText: "['Rapporto bonus calcolato: ', num2str(rapporto_bonus)]"
  resultTextInterpreter: 'none'